# ==============================================================
# 🌍 APPLICATION CONFIGURATION
# ==============================================================
spring.application.name=yowyob-erp-backend
server.port=8081

# ==============================================================
# 🗄️ POSTGRESQL DATABASE CONFIGURATION
# ==============================================================
spring.datasource.url=jdbc:postgresql://localhost:5433/yowyob_erp 
#jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

spring.datasource.username=yowyob_admin
#${POSTGRES_USER}
spring.datasource.password=yowyob_secret
#${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false



# ==============================================================
# 🧱 LIQUIBASE CONFIGURATION
# ==============================================================
# Disabled until changelog files are created
spring.liquibase.enabled=false
#spring.liquibase.change-log-sync=true
#spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml
#spring.liquibase.drop-first=false
#spring.liquibase.contexts=prod
#spring.liquibase.default-schema=public

# ==============================================================
# 🔥 REDIS CACHE CONFIGURATION
# ==============================================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ==============================================================
# 📨 KAFKA CONFIGURATION
# ==============================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.transaction-id-prefix=yowyob-erp-tx-
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1

spring.kafka.consumer.group-id=accounting-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.yowyob.erp.*
# FIX MANDATAIRE: Définit le type Java par défaut pour la désérialisation JSON
spring.kafka.consumer.properties.spring.json.value.default.type=com.yowyob.erp.accounting.entity.JournalAudit
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual_immediate

# Kafka Topics
app.kafka.topics.accounting-entries=accounting.entries
app.kafka.topics.invoice-events=invoice.events
app.kafka.topics.notifications=notifications
app.kafka.topics.audit-logs=audit.logs
app.kafka.topics.tenant-created=tenant.created
app.kafka.topics.tenant-updated=tenant.updated
app.kafka.topics.tenant-deleted=tenant.deleted

# ==============================================================
# 🔎 ELASTICSEARCH CONFIGURATION
# ==============================================================
spring.elasticsearch.uris=${ELASTICSEARCH_URI}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=30s

# ==============================================================
# ⚙️ JACKSON JSON CONFIGURATION
# ==============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false

# ==============================================================
# 📘 SWAGGER / OPENAPI CONFIGURATION
# ==============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none

# ==============================================================
# 🔐 SECURITY / AUTHENTICATION CONFIGURATION
# ==============================================================
auth.api.url=${AUTH_API_URL:https://gateway.yowyob.com/auth-service}
auth.api.timeout=${AUTH_API_TIMEOUT:5000}
auth.api.retry-attempts=${AUTH_API_RETRIES:3}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

# ==============================================================
# 🏢 MULTI-TENANT CONFIGURATION
# ==============================================================
app.tenant.header-name=X-Tenant-ID
app.tenant.default-tenant=${TENANT_DEFAULT}
app.tenant.cache-ttl=3600

# ==============================================================
# 📊 ACTUATOR / MONITORING CONFIGURATION
# ==============================================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ==============================================================
# 🪵 LOGGING CONFIGURATION
# ==============================================================
logging.level.com.yowyob.erp=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.data.jpa=INFO
#logging.level.org.springframework.core.env=DEBUG
logging.level.org.liquibase=DEBUG
logging.level.org.springframework.data.elasticsearch=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# ==============================================================
# 🗜️ SERVER COMPRESSION CONFIGURATION
# ==============================================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ==============================================================
# 🗜️ FACTURE / OCR EXTRACTION CONFIGURATION
# ==============================================================

invoice.ocr.enabled=true
invoice.ocr.tessdataPath=/usr/share/tessdata
invoice.ocr.lang=fra
