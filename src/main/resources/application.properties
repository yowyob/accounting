# ==============================================================
# 🚀 MAIN APPLICATION CONFIGURATION
# ==============================================================
spring.application.name=erp-backend
server.port=8081
# Force Reactive mode to ensure WebFilters run and Swagger works with WebFlux
spring.main.web-application-type=reactive
spring.main.allow-bean-definition-overriding=true

# Exclude auto-configurations
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

# ==============================================================
# 🗄️ DATABASE CONFIGURATION (R2DBC & JDBC)
# ==============================================================
# R2DBC Reactive Configuration
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:iwm}
spring.r2dbc.username=${POSTGRES_USER:iwm}
spring.r2dbc.password=${POSTGRES_PASSWORD:iwm}

# R2DBC Connection Pool Configuration
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=2
spring.r2dbc.pool.max-size=10
spring.r2dbc.pool.max-life-time=10m
spring.r2dbc.pool.max-idle-time=5m
spring.r2dbc.pool.validation-query=SELECT 1

# JDBC Blocking Configuration (Still needed for Liquibase)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:iwm}
spring.datasource.username=${POSTGRES_USER:iwm}
spring.datasource.password=${POSTGRES_PASSWORD:iwm}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARI JDBC POOL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=180000

# ==============================================================
# 🧱 LIQUIBASE CONFIGURATION
# ==============================================================
spring.liquibase.enabled=true

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.drop-first=false
#spring.liquibase.contexts=prod
spring.liquibase.default-schema=public
spring.liquibase.liquibase-schema=public

# ==============================================================
# 🔥 REDIS CACHE CONFIGURATION
# ==============================================================
# Handle REDIS_URL (Format: redis://:password@host:port)
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ==============================================================
# 📨 KAFKA CONFIGURATION
# ==============================================================
spring.kafka.enabled=${SPRING_KAFKA_ENABLED:true}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.transaction-id-prefix=yowyob-erp-tx-
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1

spring.kafka.consumer.group-id=accounting-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.yowyob.erp.*
# FIX MANDATAIRE: Définit le type Java par défaut pour la désérialisation JSON
spring.kafka.consumer.properties.spring.json.value.default.type=com.yowyob.erp.accounting.entity.JournalAudit
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual_immediate

# Kafka Topics
app.kafka.topics.accounting-entries=accounting.entries
app.kafka.topics.invoice-events=invoice.events
app.kafka.topics.notifications=notifications
app.kafka.topics.audit-logs=audit.logs
app.kafka.topics.organization-created=organization.created
app.kafka.topics.organization-updated=organization.updated
app.kafka.topics.organization-deleted=organization.deleted
app.kafka.topics.treasury-sync=treasury.sync.events

# New Module Topics
app.kafka.topics.stock-events=stock.events
app.kafka.topics.thirdparty-events=thirdparty.events
app.kafka.topics.organization-events=organization.events

# Elasticsearch
spring.elasticsearch.enabled=${SPRING_ELASTICSEARCH_ENABLED:true}
spring.elasticsearch.uris=${ELASTICSEARCH_URI:http://localhost:9200}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=30s

# ==============================================================
# ⚙️ JACKSON JSON CONFIGURATION
# ==============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false

# ==============================================================
# 📘 SWAGGER / OPENAPI CONFIGURATION
# ==============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none

# ==============================================================
# 🔐 SECURITY / AUTHENTICATION CONFIGURATION
# ==============================================================
# Auth API = KSM_Kernel_Layer (RT-comops-bootstrap)
# En dev local : http://localhost:8080
# En production Docker (réseau iwm-network) : http://app:8080
auth.api.url=${AUTH_API_URL:http://localhost:8080}
auth.api.health-url=${AUTH_API_HEALTH_URL:${auth.api.url}/actuator/health}
auth.api.timeout=${AUTH_API_TIMEOUT:5000}
auth.api.retry-attempts=${AUTH_API_RETRIES:1}
auth.jwt.issuer=${AUTH_JWT_ISSUER:}
auth.api.default-tenant-id=${KERNEL_TENANT_ID:}

# ==============================================================
# 🪪 KERNEL CLIENT APPLICATION — Identification du BACKEND
# ==============================================================
# Correspond à IWM_BOOTSTRAP_CLIENT_ID / IWM_BOOTSTRAP_CLIENT_SECRET
# configurés dans KSM_Kernel_Layer/.env.prod (ou .env.local)
kernel.client.id=${KERNEL_CLIENT_ID:dev-platform-backend}
kernel.client.secret=${KERNEL_CLIENT_SECRET:dev-api-key}


app.jwt.secret=${JWT_SECRET:dev-only-ksm-erp-jwt-secret-change-me}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================================================
# 🧪 MOCK AUTH FALLBACK
# ==============================================================
# Bascule automatique si le service externe (auth.api.url) est indisponible.
# Doit rester désactivée en production.
# Comptes de test : admin@ksm.dev/admin123 | comptable@ksm.dev/comptable123
#                   aide@ksm.dev/aide123   | daf@ksm.dev/daf123
auth.mock.enabled=${AUTH_MOCK_ENABLED:true}
auth.mock.connectivity-timeout-ms=${AUTH_CONNECTIVITY_TIMEOUT:2000}

# ==============================================================
# 🏢 MULTI-ORGANIZATION CONFIGURATION
# ==============================================================
app.organization.header-name=X-Tenant-ID
app.organization.default-organization=${ORGANIZATION_DEFAULT:4e177ff2-89b8-4d24-926a-5763dfa1b19a}
app.organization.cache-ttl=3600

# ==============================================================
# 🌐 CORS CONFIGURATION
# ==============================================================
# Comma-separated list of allowed frontend origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ==============================================================
# 📊 ACTUATOR / MONITORING CONFIGURATION
# ==============================================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ==============================================================
# 🪵 LOGGING CONFIGURATION
# ==============================================================
logging.level.com.yowyob.erp=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.data.jpa=INFO
#logging.level.org.springframework.core.env=DEBUG
logging.level.org.liquibase=DEBUG
logging.level.org.springframework.data.elasticsearch=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# ==============================================================
# 🗜️ SERVER COMPRESSION CONFIGURATION
# ==============================================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ==============================================================
# 🗜️ FACTURE / OCR EXTRACTION CONFIGURATION
# ==============================================================

invoice.ocr.enabled=true
invoice.ocr.tessdataPath=/usr/share/tessdata
invoice.ocr.lang=fra

# ==============================================================
# 📅 AUTOMATIC PERIOD CLOSURE CONFIGURATION
# ==============================================================
cloture.auto.enabled=true
cloture.auto.delai_jours=5

# Sondes liveness/readiness (healthcheck conteneur)
management.endpoint.health.probes.enabled=true
