# ==============================================================
# 🏭 YOWYOB-ERP-ACCOUNTING — PRODUCTION sur le serveur yowyob
# ==============================================================
# Build LOCAL par le runner GitLab (pas de registry). Branché sur l'infra
# EXISTANTE du serveur (réseau "yowyob") :
#   - PostgreSQL  "database:5432"  -> base dédiée "accounting"
#   - Kafka       "kafka:29092"    -> SASL_PLAINTEXT / SCRAM-SHA-256 (user dédié accounting)
#   - kernel-core "kernel-core-kernel-layer-1:8080" -> validation auth (client dédié)
#   - Traefik (providers.docker.network=yowyob) -> accounting.yowyob.com
# Redis : sidecar privé (cache + AuthService). Elasticsearch & OCR : désactivés.
# Secrets (mots de passe) : dans .env côté serveur (gitignoré) — cette app ne lit pas les *_FILE.
# ==============================================================
services:

  erp-accounting-backend:
    image: "${ACCOUNTING_IMAGE:?ACCOUNTING_IMAGE requis - ex accounting/backend:main}"
    container_name: erp-accounting-backend
    pull_policy: never            # image construite localement par le job CI build
    restart: unless-stopped
    env_file: [.env]
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      SERVER_PORT: "8081"

      # ── PostgreSQL : base dédiée "accounting" (R2DBC + Liquibase JDBC) ──
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_NAME: "accounting"
      POSTGRES_USER: "accounting"
      POSTGRES_PASSWORD: "${ACCOUNTING_DB_PASSWORD:?ACCOUNTING_DB_PASSWORD requis dans .env}"
      LIQUIBASE_URL: "jdbc:postgresql://database:5432/accounting"
      LIQUIBASE_USER: "accounting"
      LIQUIBASE_PASSWORD: "${ACCOUNTING_DB_PASSWORD:?ACCOUNTING_DB_PASSWORD requis dans .env}"

      # ── Redis sidecar privé ──
      REDIS_HOST: "accounting-redis"
      REDIS_PORT: "6379"
      REDIS_URL: "redis://accounting-redis:6379"
      SPRING_CACHE_TYPE: "redis"

      # ── Kafka du serveur = SASL_PLAINTEXT / SCRAM-SHA-256 (user dédié accounting) ──
      KAFKA_BOOTSTRAP: "kafka:29092"
      SPRING_KAFKA_ENABLED: "true"
      SPRING_KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
      SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: "SCRAM-SHA-256"
      SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="accounting" password="${ACCOUNTING_KAFKA_PASSWORD:?ACCOUNTING_KAFKA_PASSWORD requis dans .env}";'

      # ── Elasticsearch : NON utilisé (aucun @Document) -> coupé ──
      SPRING_ELASTICSEARCH_ENABLED: "false"
      ELASTICSEARCH_URI: ""
      # ── OCR factures : lib native Tesseract absente de l'image -> coupé ──
      INVOICE_OCR_ENABLED: "false"

      # ── Auth : validée contre kernel-core (client dédié accounting-backend) ──
      AUTH_API_URL: "http://kernel-core-kernel-layer-1:8080"
      AUTH_API_HEALTH_URL: "http://kernel-core-kernel-layer-1:8081/actuator/health/readiness"
      AUTH_API_TIMEOUT: "5000"
      AUTH_API_RETRIES: "3"
      AUTH_JWT_ISSUER: "kernel-core"
      AUTH_MOCK_ENABLED: "false"
      KERNEL_CLIENT_ID: "accounting-backend"
      KERNEL_CLIENT_SECRET: "${ACCOUNTING_KERNEL_CLIENT_SECRET:?ACCOUNTING_KERNEL_CLIENT_SECRET requis dans .env}"
      KERNEL_TENANT_ID: "${ACCOUNTING_TENANT_ID:-11111111-1111-1111-1111-111111111111}"

      # ── JWT applicatif local ──
      JWT_SECRET: "${ACCOUNTING_JWT_SECRET:?ACCOUNTING_JWT_SECRET requis dans .env}"
      JWT_EXPIRATION: "86400000"

      # ── Multi-tenant + CORS ──
      TENANT_DEFAULT: "${ACCOUNTING_TENANT_ID:-11111111-1111-1111-1111-111111111111}"
      CORS_ALLOWED_ORIGINS: "${ACCOUNTING_CORS_ORIGINS:-https://accounting.yowyob.com}"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      - "traefik.enable=true"
      # Routage par chemin : un seul domaine accounting.yowyob.com.
      #   /accounting-api/** -> ce backend (préfixe retiré avant transmission)
      #   /**                -> réservé au futur front accounting (même domaine)
      - "traefik.http.routers.accounting-api.rule=Host(`accounting.yowyob.com`) && PathPrefix(`/accounting-api`)"
      - "traefik.http.routers.accounting-api.entrypoints=websecure"
      - "traefik.http.routers.accounting-api.tls=true"
      - "traefik.http.routers.accounting-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.accounting-api.priority=100"
      - "traefik.http.middlewares.accounting-api-strip.stripprefix.prefixes=/accounting-api"
      - "traefik.http.routers.accounting-api.middlewares=accounting-api-strip"
      - "traefik.http.services.accounting-api.loadbalancer.server.port=8081"
      - "traefik.docker.network=yowyob"
    depends_on:
      accounting-redis:
        condition: service_healthy
    networks:
      - yowyob          # PostgreSQL + Kafka + kernel-core + exposition Traefik
      - accounting      # privé : backend <-> redis

  accounting-redis:
    image: redis:8.6.2-alpine
    pull_policy: if_not_present
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - accounting-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accounting

volumes:
  accounting-redis-data:

networks:
  # Réseau partagé EXISTANT du serveur (Traefik / PostgreSQL / Kafka / kernel-core).
  yowyob:
    external: true
    name: yowyob
  # Réseau privé interne backend <-> redis (créé par ce compose).
  accounting:
    name: accounting-net
