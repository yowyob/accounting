services:
  - type: web
    name: yowyob-erp-backend
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Liquibase config
      - key: SPRING_LIQUIBASE_CHANGE_LOG
        value: classpath:db/changelog/db.changelog-master.xml
      
      # --- POSTGRESQL (Auto-provisioned by Render) ---
      # application.properties builds R2DBC and JDBC URLs from these components
      - key: DB_HOST
        fromDatabase:
          name: yowyob-erp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: yowyob-erp-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: yowyob-erp-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: yowyob-erp-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: yowyob-erp-db
          property: password
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: yowyob-erp-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: yowyob-erp-db
          property: password

      # --- REDIS (Disabled for free plan) ---
      - key: SPRING_CACHE_TYPE
        value: none
 
      # --- KAFKA & ELASTIC (Disabled by default for cost/simplicity) ---
      - key: SPRING_KAFKA_ENABLED
        value: "false" 
      - key: SPRING_ELASTICSEARCH_ENABLED
        value: "false"
      # Elastic require external service or can be ignored if not critical on startup
      - key: SPRING_ELASTICSEARCH_URIS
        value: ""

      # --- CORS ---
      - key: CORS_ALLOWED_ORIGINS
        value: "https://yowyob-erp-accounting.vercel.app,http://localhost:3000"

databases:
  - name: yowyob-erp-db
    plan: free
    databaseName: yowyob_erp
    user: yowyob_admin
