services:
  - type: web
    name: yowyob-erp-backend
    runtime: docker # Indique à Render d'utiliser votre Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_LIQUIBASE_CHANGE_LOG
        value: classpath:db/changelog/db.changelog-master.xml 
       
      # Construction manuelle de l'URL JDBC pour Java
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      
      - key: DB_HOST
        fromDatabase:
          name: yowyob-erp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: yowyob-erp-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: yowyob-erp-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: yowyob-erp-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: yowyob-erp-db
          property: password

databases:
  - name: yowyob-erp-db
    plan: free
