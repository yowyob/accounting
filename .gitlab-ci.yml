stages:
  - build
  - deploy

variables:
  GIT_DEPTH: "0"
  # Pas de registry : build & deploy locaux sur le serveur (runner sur place).
  IMAGE: accounting/backend
  IMMUTABLE_TAG: ${CI_COMMIT_BRANCH}_${CI_COMMIT_SHORT_SHA}
  DEPLOY_DIR: /home/gi/accounting

# Le build Maven (compilation de tout le code) est fait DANS le Dockerfile multi-stage :
# un échec de compilation bloque le déploiement. La suite de tests (@SpringBootTest contextLoads)
# exige une infra complète (PostgreSQL/Redis/Kafka) non disponible en isolation -> elle est jouée
# par le DÉMARRAGE réel du conteneur sur le serveur (healthcheck = gate de déploiement).
Build-image:
  stage: build
  tags: [kernel-core]
  image: docker:27
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
    DOCKER_BUILDKIT: "1"
  script:
    - docker build -t "$IMAGE:$IMMUTABLE_TAG" -t "$IMAGE:$CI_COMMIT_BRANCH" .
  rules:
    - if: '$CI_COMMIT_BRANCH == "HEXAGONAL"'

deploy:
  stage: deploy
  tags: [kernel-core]
  image: alpine:latest
  before_script:
    - which ssh-agent || apk add --no-cache openssh
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan "$HOST_ADDR" >> ~/.ssh/known_hosts 2>/dev/null
    - chmod 644 ~/.ssh/known_hosts
  script:
    - scp -o StrictHostKeyChecking=no docker-compose.prod.yml "${HOST_USER}@${HOST_ADDR}:${DEPLOY_DIR}/docker-compose.prod.yml"
    - |
      ssh "${HOST_USER}@${HOST_ADDR}" "
        set -e
        cd '${DEPLOY_DIR}'
        export ACCOUNTING_IMAGE='$IMAGE:$IMMUTABLE_TAG'
        docker compose -f docker-compose.prod.yml up -d
        docker compose -f docker-compose.prod.yml ps
        docker image prune -f
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "HEXAGONAL"'
