services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: yowyob_erp
      POSTGRES_USER: yowyob_admin
      POSTGRES_PASSWORD: yowyob_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yowyob_admin -d yowyob_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s 

  liquibase:
    image: liquibase/liquibase:latest
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /liquibase/db/changelog
    volumes:
      # Monte le répertoire contenant les fichiers de migration Liquibase
      - ./src/main/resources/db/changelog:/liquibase/db/changelog
      # Monte le répertoire contenant le driver JDBC PostgreSQL
      - ./src/main/resources/drivers:/liquibase/lib
    command: [
      "--url=jdbc:postgresql://postgres:5432/yowyob_erp",
      "--changeLogFile=changelog-master.xml",
      "--username=yowyob_admin",
      "--password=yowyob_secret",
      # Assurez-vous que le nom du driver correspond au fichier dans le dossier 'drivers'
      "--classpath=/liquibase/lib/postgresql-42.7.3.jar", 
      "update"
    ]
    networks: 
      - my-network

  # Elasticsearch : moteur de recherche pour l'indexation et la recherche de données
  elasticsearch:
    image: elasticsearch:8.11.1
    hostname: elasticsearch
    container_name: elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - my-network
    healthcheck: # FIX: Ajout du healthcheck pour vérifier la disponibilité de l'API
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cat/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s # ES est lourd, nécessite un délai

  # Zookeeper : coordinateur pour le cluster Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - my-network
    healthcheck:
      # FIX: Rendre le check plus robuste et augmenter les tentatives/délai
      test: ["CMD-SHELL", "echo 'ruok' | nc -w 1 localhost 2181 | grep imok || exit 1"] 
      interval: 10s
      timeout: 5s
      retries: 10 # Augmenté
      start_period: 15s # Augmenté

  # Kafka : broker de messages, dépendant de Zookeeper
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
    networks:
      - my-network
    depends_on:
      zookeeper:
        condition: service_started # FIX: Attend que Zookeeper soit démarré
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s 

  # Redis : base de données en mémoire pour le cache
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6380:6379"
    command: redis-server --bind 0.0.0.0 --requirepass azaleodel --port 6379
    volumes:
      - redis-data:/data
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a azaleodel -p 6379 ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Kafka UI : interface utilisateur pour l'administration de Kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - my-network
    depends_on:
      kafka:
        condition: service_healthy # FIX: Attend que Kafka soit sain

  # application Spring Boot (yowyob-erp-backend)
  yowyob-erp-backend:
    build:
      context: .
    container_name: yowyob-erp-backend
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - spring.datasource.url=jdbc:postgresql://postgres:5432/yowyob_erp
      - spring.datasource.username=yowyob_admin
      - spring.datasource.password=yowyob_secret
      - spring.datasource.driver-class-name=org.postgresql.Driver
      - spring.data.redis.host=redis
      - spring.data.redis.port=6379 
      - spring.data.redis.password=azaleodel
      - spring.kafka.bootstrap-servers=kafka:9092
      - spring.liquibase.enabled=false
      - spring.kafka.producer.transaction-id-prefix=yowyob-erp-tx-
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy # FIX: Attend qu'ES soit sain
      kafka:
        condition: service_healthy # FIX: Attend que Kafka soit sain
      redis:
        condition: service_healthy
    networks:
      - my-network

# Définition des volumes nommés pour la persistance des données.
volumes:
  postgres-data:
  es-data:
  redis-data:

# Définition du réseau partagé par tous les services.
networks:
  my-network:
    driver: bridge