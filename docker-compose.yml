services:
  # ScyllaDB : base de données NoSQL compatible Cassandra pour la persistance des données
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: yowyob_erp
      POSTGRES_USER: yowyob_admin
      POSTGRES_PASSWORD: yowyob_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yowyob_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/changelog:/liquibase/changelog
    command: [
      "--url=jdbc:postgresql://postgres:5432/yowyob_erp",
      "--changeLogFile=changelog-master.xml",
      "--username=yowyob_admin",
      "--password=yowyob_secret",
      "update"
    ]


  # Elasticsearch : moteur de recherche pour l'indexation et la recherche de données
  elasticsearch:
    image: elasticsearch:8.11.1
    hostname: elasticsearch
    container_name: elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - my-network

  # Zookeeper : coordinateur pour le cluster Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - my-network

  # Kafka : broker de messages, dépendant de Zookeeper
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
    networks:
      - my-network
    depends_on:
      zookeeper:
        condition: service_started

  # Redis : base de données en mémoire pour le cache
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6380:6379"  # Correction : mappe 6380 (hôte) vers 6379 (conteneur)
    command: redis-server --bind 0.0.0.0 --requirepass azaleodel --port 6379
    volumes:
      - redis-data:/data
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a azaleodel -p 6379 ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Kafka UI : interface utilisateur pour l'administration de Kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - my-network
    depends_on:
      kafka:
        condition: service_started

  # Votre application Spring Boot (yowyob-erp-backend)
  yowyob-erp-backend:
    build:
      context: .
    container_name: yowyob-erp-backend
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - spring.cassandra.contact-points=scylla
      - spring.cassandra.port=9042
      - spring.cassandra.local-datacenter=datacenter1
      - spring.redis.host=redis
      - spring.redis.port=6380
      - spring.redis.password=azaleodel
      - spring.kafka.bootstrap-servers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - my-network

# Définition des volumes nommés pour la persistance des données.
volumes:
  postgres-data:
  es-data:
  redis-data:

# Définition du réseau partagé par tous les services.
networks:
  my-network:
    driver: bridge

